name: upload app

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v3 # Use v3 for OIDC support
        with:
          role-to-assume: arn:aws:iam::559198857091:role/GitHubAction-S3-Deploy
          aws-region: eu-north-1

      - name: deploy static site to s3 bucket
        run: aws s3 sync . s3://untitledbucket71 --delete
